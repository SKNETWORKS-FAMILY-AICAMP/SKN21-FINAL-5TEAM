services:
  mysql:
    image: mysql:8.0
    container_name: adapter-lab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecom_user
      MYSQL_PASSWORD: "ecopchatbot!"
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - adapter_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: adapter-lab-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - adapter_qdrant_data:/qdrant/storage

  ecommerce-backend:
    build:
      context: .
      dockerfile: docker/AWS/Dockerfile.backend
    container_name: adapter-lab-ecommerce
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ecom_user
      DB_PASSWORD: "ecopchatbot!"
      DB_NAME: ecommerce
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  bilyeo-backend:
    build:
      context: .
      dockerfile: docker/SaaS/bilyeo.backend.Dockerfile
    container_name: adapter-lab-bilyeo
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"

  food-backend:
    build:
      context: .
      dockerfile: docker/SaaS/food.backend.Dockerfile
    container_name: adapter-lab-food
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"

  chatbot-api:
    build:
      context: .
      dockerfile: docker/SaaS/chatbot.api.Dockerfile
    container_name: adapter-lab-chatbot
    restart: unless-stopped
    environment:
      PYTHONPATH: /workspace
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ecom_user
      DB_PASSWORD: "ecopchatbot!"
      DB_NAME: ecommerce
      BACKEND_API_URL: http://ecommerce-backend:8000
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-local-dev-key}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-EMPTY}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3.5-35B-A3B}
    volumes:
      - ./chatbot:/workspace/chatbot
      - ./SaaS:/workspace/SaaS
      - ./ecommerce:/workspace/ecommerce:ro
      - ./bilyeo:/workspace/bilyeo:ro
      - ./food:/workspace/food:ro
      - ./pyproject.toml:/workspace/pyproject.toml:ro
      - ./README.md:/workspace/README.md:ro
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      ecommerce-backend:
        condition: service_started
    ports:
      - "127.0.0.1:8100:8100"
    command: ["uv", "run", "uvicorn", "server_fastapi:app", "--app-dir", "/workspace/chatbot", "--host", "0.0.0.0", "--port", "8100", "--reload"]

  adapter-dev:
    build:
      context: .
      dockerfile: docker/SaaS/chatbot.api.Dockerfile
    container_name: adapter-lab-dev
    stdin_open: true
    tty: true
    environment:
      PYTHONPATH: /workspace
    volumes:
      - ./chatbot:/workspace/chatbot
      - ./SaaS:/workspace/SaaS
      - ./ecommerce:/workspace/ecommerce:ro
      - ./bilyeo:/workspace/bilyeo:ro
      - ./food:/workspace/food:ro
      - ./pyproject.toml:/workspace/pyproject.toml:ro
    command: ["bash", "-lc", "sleep infinity"]

volumes:
  adapter_mysql_data:
  adapter_qdrant_data:
