<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>프로젝트 타임라인</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 35%;
    height: 100%;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 65%;
    height: 100%;
    padding: 60px;
    display: flex;
    align-items: center;
    position: relative;
    z-index: 10
    }
.heading-medium {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #999;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 3px
    }
.heading-large {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 56px;
    line-height: 1.1;
    color: #000;
    margin-bottom: 30px
    }
.accent-bar {
    width: 80px;
    height: 6px;
    background-color: #000;
    margin-bottom: 30px
    }
.body-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #666;
    line-height: 1.8
    }
.timeline-container {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    width: 100%
    }
.timeline-line {
    position: absolute;
    left: 30px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, #000 0%, #000 100%)
    }
.timeline-item {
    display: flex;
    align-items: flex-start;
    position: relative;
    padding-left: 80px;
    margin-bottom: 45px
    }
.timeline-item:last-child {
    margin-bottom: 0
    }
.timeline-dot {
    position: absolute;
    left: 20px;
    top: 8px;
    width: 20px;
    height: 20px;
    background-color: #000;
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: 0 0 0 2px #000;
    z-index: 2
    }
.timeline-date {
    position: absolute;
    left: -140px;
    top: 6px;
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #000;
    white-space: nowrap
    }
.timeline-content {
    background-color: #f8f8f8;
    padding: 20px 25px;
    border-radius: 8px;
    flex: 1;
    border-left: 3px solid #000
    }
.timeline-title {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #000;
    margin-bottom: 8px
    }
.timeline-desc {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 14px;
    color: #666;
    line-height: 1.5
    }
.circle-decoration {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 250px;
    height: 250px;
    border: 25px solid #f5f5f5;
    bottom: -80px;
    left: -80px;
    opacity: 0.5
    }
.circle-2 {
    width: 180px;
    height: 180px;
    border: 20px solid #f5f5f5;
    top: 60px;
    right: -60px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 25px 25px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-decoration circle-1"></div>
<div class="circle-decoration circle-2"></div>

<!-- Left Content -->
<div class="left-content">
<div style="position: relative;
z-index: 2">
<p class="heading-medium">PROJECT TIMELINE</p>
<h1 class="heading-large">프로젝트<br/>타임라인</h1>
<div class="accent-bar"></div>
<p class="body-text">
AI 챗봇 웹사이트 개발 프로젝트의 주요 단계와 마일스톤을 시간순으로 정리합니다.
</p>
</div>
</div>

<!-- Right Content -->
<div class="right-content">
<div class="timeline-container">
<div class="timeline-line"></div>
<div style="position: relative;
z-index: 2;
margin-left: 140px">
<!-- Timeline Item 1 -->
<div class="timeline-item">
<div class="timeline-date">1개월</div>
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3 class="timeline-title">요구사항 분석 & 설계</h3>
<p class="timeline-desc">기획서 작성, 아키텍처 설계, 기술 스택 선정</p>
</div>
</div>

<!-- Timeline Item 2 -->
<div class="timeline-item">
<div class="timeline-date">2-3개월</div>
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3 class="timeline-title">프론트엔드 개발</h3>
<p class="timeline-desc">UI/UX 디자인, React 컴포넌트 구현, 챗봇 인터페이스 개발</p>
</div>
</div>

<!-- Timeline Item 3 -->
<div class="timeline-item">
<div class="timeline-date">4-5개월</div>
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3 class="timeline-title">백엔드 & AI 모델 개발</h3>
<p class="timeline-desc">API 서버 구축, 데이터베이스 설계, NLU 엔진 구현</p>
</div>
</div>

<!-- Timeline Item 4 -->
<div class="timeline-item">
<div class="timeline-date">6개월</div>
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3 class="timeline-title">통합 테스트 & 배포</h3>
<p class="timeline-desc">시스템 통합, 성능 테스트, 운영 환경 배포, 모니터링 구축</p>
</div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
