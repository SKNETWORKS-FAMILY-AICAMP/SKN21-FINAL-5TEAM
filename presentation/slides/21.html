<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>목차</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="theme.css" rel="stylesheet"/>
<style>
.slide-inner {
    display: flex;
    gap: 48px;
    height: calc(100% - 80px);
    align-items: center;
}
.left-col {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.right-col {
    flex: 1;
}
.content-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(6, auto);
    grid-auto-flow: column;
    column-gap: 40px;
}
.content-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
    position: relative;
}
.content-item.done {
    opacity: 0.55;
}
.content-item.done .item-text {
    text-decoration: line-through;
    text-decoration-color: var(--accent);
}
.item-number {
    font-family: "Montserrat", sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: var(--accent-soft);
    min-width: 44px;
    line-height: 1;
    /* actual color overlay */
    -webkit-text-stroke: 1.5px var(--accent);
    color: transparent;
}
.item-text {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
}
.content-item.active .item-number {
    -webkit-text-stroke: none;
    color: var(--coral);
}
.content-item.active .item-text {
    color: var(--coral-strong);
    font-weight: 700;
}
</style>
</head>
<body>
<main class="slide">
  <div class="topbar">
    <p class="eyebrow">Contents</p>
    <span class="page-number">21</span>
  </div>
  <div class="slide-inner">
    <div class="left-col hero">
      <h1 style="font-size:52px; line-height:1.0; margin-bottom: 4px;">목차</h1>
      <div class="accent-bar"></div>
      <p class="lead">AI 고객상담 챗봇 웹사이트 제작<br/>프로젝트의 전체 개요</p>
    </div>
    <div class="right-col">
      <div class="content-list">
        <div class="content-item done">
          <span class="item-number">01</span>
          <span class="item-text">문제 정의</span>
        </div>
        <div class="content-item done">
          <span class="item-number">02</span>
          <span class="item-text">챗봇 필요성 분석</span>
        </div>
        <div class="content-item done">
          <span class="item-number">03</span>
          <span class="item-text">웹사이트 아키텍처</span>
        </div>
        <div class="content-item done">
          <span class="item-number">04</span>
          <span class="item-text">챗봇 프레임워크</span>
        </div>
        <div class="content-item done">
          <span class="item-number">05</span>
          <span class="item-text">프로젝트 타임라인</span>
        </div>
        <div class="content-item done">
          <span class="item-number">06</span>
          <span class="item-text">마일스톤</span>
        </div>
        <div class="content-item">
          <span class="item-number">07</span>
          <span class="item-text">데이터베이스 설계</span>
        </div>
        <div class="content-item">
          <span class="item-number">08</span>
          <span class="item-text">백엔드 API 개발</span>
        </div>
        <div class="content-item">
          <span class="item-number">09</span>
          <span class="item-text">프론트엔드 UI 제작</span>
        </div>
        <div class="content-item">
          <span class="item-number">10</span>
          <span class="item-text">LLM 모델 튜닝</span>
        </div>
        <div class="content-item">
          <span class="item-number">11</span>
          <span class="item-text">품질 보증 및 테스트</span>
        </div>
        <div class="content-item">
          <span class="item-number">12</span>
          <span class="item-text">최종 시연 및 결론</span>
        </div>
      </div>
    </div>
  </div>
  <p class="footnote">SKN21 FINAL 5TEAM · 2026 Project Presentation</p>
</main>
</body>
</html>
