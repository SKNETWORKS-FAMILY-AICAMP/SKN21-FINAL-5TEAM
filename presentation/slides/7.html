<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>웹사이트 아키텍처</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 38%;
    height: 100%;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 62%;
    height: 100%;
    padding: 50px 60px 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.heading-medium {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #999;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 3px
    }
.heading-large {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 52px;
    line-height: 1.1;
    color: #000;
    margin-bottom: 30px
    }
.accent-bar {
    width: 80px;
    height: 6px;
    background-color: #000;
    margin-bottom: 30px
    }
.body-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #666;
    line-height: 1.8
    }
.architecture-diagram {
    display: flex;
    flex-direction: column;
    gap: 25px
    }
.arch-layer {
    display: flex;
    align-items: stretch;
    gap: 25px
    }
.layer-label {
    width: 140px;
    background-color: #000;
    color: #fff;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 4px
    }
.layer-content {
    flex: 1;
    background-color: #f5f5f5;
    padding: 15px 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap
    }
.tech-item {
    background-color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    display: flex;
    align-items: center;
    gap: 8px
    }
.tech-icon {
    width: 24px;
    height: 24px;
    background-color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px
    }
.connection-line {
    width: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 20px
    }
.circle-decoration {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 250px;
    height: 250px;
    border: 25px solid #f5f5f5;
    bottom: -80px;
    left: -80px;
    opacity: 0.5
    }
.circle-2 {
    width: 180px;
    height: 180px;
    border: 20px solid #f5f5f5;
    top: 60px;
    right: -60px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 25px 25px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-decoration circle-1"></div>
<div class="circle-decoration circle-2"></div>

<!-- Left Content -->
<div class="left-content">
<div style="position: relative;
z-index: 2">
<p class="heading-medium">ARCHITECTURE</p>
<h1 class="heading-large">웹사이트<br/>아키텍처</h1>
<div class="accent-bar"></div>
<p class="body-text">
프론트엔드와 백엔드로 구성된 전체 시스템 구조를 다이어그램으로 시각화합니다.
</p>
</div>
</div>

<!-- Right Content -->
<div class="right-content">
<div class="architecture-diagram" style="position: relative;
z-index: 2">
<!-- Frontend Layer -->
<div class="arch-layer">
<div class="layer-label">FRONTEND</div>
<div class="layer-content">
<div class="tech-item">
<div class="tech-icon"><i class="fab fa-react"></i></div>
<span>React.js</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fab fa-vuejs"></i></div>
<span>Vue.js</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-mobile-alt"></i></div>
<span>반응형 UI</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-comments"></i></div>
<span>챗봇 인터페이스</span>
</div>
</div>
</div>

<!-- Connection Line -->
<div class="connection-line">
<i class="fas fa-arrows-alt-v"></i>
</div>

<!-- Backend Layer -->
<div class="arch-layer">
<div class="layer-label">BACKEND</div>
<div class="layer-content">
<div class="tech-item">
<div class="tech-icon"><i class="fab fa-node-js"></i></div>
<span>Node.js</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fab fa-python"></i></div>
<span>Django</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-database"></i></div>
<span>PostgreSQL</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-server"></i></div>
<span>REST API</span>
</div>
</div>
</div>

<!-- Connection Line -->
<div class="connection-line">
<i class="fas fa-arrows-alt-v"></i>
</div>

<!-- AI Chatbot Layer -->
<div class="arch-layer">
<div class="layer-label">AI CHATBOT</div>
<div class="layer-content">
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-brain"></i></div>
<span>NLU Engine</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-comment-dots"></i></div>
<span>Dialogflow</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-robot"></i></div>
<span>GPT Model</span>
</div>
<div class="tech-item">
<div class="tech-icon"><i class="fas fa-cogs"></i></div>
<span>Context Manager</span>
</div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
