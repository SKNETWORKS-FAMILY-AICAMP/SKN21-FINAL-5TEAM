<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>프론트엔드 프레임워크</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 40%;
    height: 100%;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 60%;
    height: 100%;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.heading-medium {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #999;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 3px
    }
.heading-large {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 56px;
    line-height: 1.1;
    color: #000;
    margin-bottom: 30px
    }
.accent-bar {
    width: 80px;
    height: 6px;
    background-color: #000;
    margin-bottom: 30px
    }
.body-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #666;
    line-height: 1.8
    }
.framework-item {
    display: flex;
    align-items: center;
    background-color: #f8f8f8;
    padding: 30px;
    margin-bottom: 20px;
    border-radius: 8px;
    position: relative;
    transition: all 0.3s ease
    }
.framework-item:hover {
    background-color: #000;
    transform: translatex(10px)
    }
.framework-item:hover .framework-title,
.framework-item:hover .framework-desc {
    color: #fff
    }
.framework-icon {
    width: 80px;
    height: 80px;
    background-color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 30px;
    flex-shrink: 0
    }
.framework-icon i {
    font-size: 36px;
    color: #fff
    }
.framework-content {
    flex: 1
    }
.framework-title {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #000;
    margin-bottom: 8px;
    letter-spacing: 1px
    }
.framework-desc {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 16px;
    color: #666;
    line-height: 1.5
    }
.circle-decoration {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 250px;
    height: 250px;
    border: 25px solid #f5f5f5;
    bottom: -80px;
    left: -80px;
    opacity: 0.5
    }
.circle-2 {
    width: 180px;
    height: 180px;
    border: 20px solid #f5f5f5;
    top: 60px;
    right: -60px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 25px 25px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-decoration circle-1"></div>
<div class="circle-decoration circle-2"></div>

<!-- Left Content -->
<div class="left-content">
<div style="position: relative;
z-index: 2">
<p class="heading-medium">FRONTEND</p>
<h1 class="heading-large">프론트엔드<br/>프레임워크</h1>
<div class="accent-bar"></div>
<p class="body-text">
사용자 인터페이스 구축을 위해 선택한 프론트엔드 기술 스택과 선정 이유를 설명합니다.
</p>
</div>
</div>

<!-- Right Content -->
<div class="right-content">
<div style="position: relative;
z-index: 2">
<!-- React Framework -->
<div class="framework-item">
<div class="framework-icon">
<i class="fab fa-react"></i>
</div>
<div class="framework-content">
<h3 class="framework-title">React.js</h3>
<p class="framework-desc">컴포넌트 기반 아키텍처로 재사용성과 유지보수성 확보</p>
</div>
</div>

<!-- Next.js Framework -->
<div class="framework-item">
<div class="framework-icon">
<i class="fas fa-bolt"></i>
</div>
<div class="framework-content">
<h3 class="framework-title">Next.js</h3>
<p class="framework-desc">서버 사이드 렌더링과 SEO 최적화 지원</p>
</div>
</div>

<!-- TypeScript Framework -->
<div class="framework-item">
<div class="framework-icon">
<i class="fab fa-js"></i>
</div>
<div class="framework-content">
<h3 class="framework-title">TypeScript</h3>
<p class="framework-desc">정적 타이핑으로 개발 생산성 향상 및 오류 감소</p>
</div>
</div>

<!-- Tailwind CSS -->
<div class="framework-item">
<div class="framework-icon">
<i class="fas fa-wind"></i>
</div>
<div class="framework-content">
<h3 class="framework-title">Tailwind CSS</h3>
<p class="framework-desc">유틸리티 기반 CSS로 빠른 UI 개발 및 일관성 유지</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
