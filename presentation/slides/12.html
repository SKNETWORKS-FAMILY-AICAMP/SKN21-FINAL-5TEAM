<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>데이터 처리 흐름</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 35%;
    height: 100%;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 65%;
    height: 100%;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.heading-medium {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #999;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 3px
    }
.heading-large {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 56px;
    line-height: 1.1;
    color: #000;
    margin-bottom: 30px
    }
.accent-bar {
    width: 80px;
    height: 6px;
    background-color: #000;
    margin-bottom: 30px
    }
.body-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #666;
    line-height: 1.8
    }
.flow-container {
    display: flex;
    flex-direction: column;
    gap: 20px
    }
.flow-item {
    display: flex;
    align-items: center;
    gap: 20px
    }
.flow-number {
    width: 50px;
    height: 50px;
    background-color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: "Montserrat", sans-serif;
    font-weight: 900;
    font-size: 22px;
    flex-shrink: 0
    }
.flow-content {
    flex: 1;
    background-color: #f8f8f8;
    padding: 20px 25px;
    border-radius: 8px;
    border-left: 4px solid #000
    }
.flow-title {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #000;
    margin-bottom: 6px
    }
.flow-desc {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 14px;
    color: #666;
    line-height: 1.5
    }
.flow-arrow {
    text-align: center;
    font-size: 20px;
    color: #ccc;
    margin: 5px 0
    }
.circle-decoration {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 200px;
    height: 200px;
    border: 20px solid #f5f5f5;
    bottom: -80px;
    left: -80px;
    opacity: 0.5
    }
.circle-2 {
    width: 150px;
    height: 150px;
    border: 15px solid #f5f5f5;
    top: 60px;
    right: -60px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 25px 25px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-decoration circle-1"></div>
<div class="circle-decoration circle-2"></div>

<!-- Left Content -->
<div class="left-content">
<div style="position: relative;
z-index: 2">
<p class="heading-medium">DATA FLOW</p>
<h1 class="heading-large">데이터 처리<br/>흐름</h1>
<div class="accent-bar"></div>
<p class="body-text">
사용자 입력부터 최종 응답까지의 전체 데이터 처리 과정을 단계별로 시각화합니다.
</p>
</div>
</div>

<!-- Right Content -->
<div class="right-content">
<div class="flow-container" style="position: relative;
z-index: 2">
<!-- Step 1 -->
<div class="flow-item">
<div class="flow-number">1</div>
<div class="flow-content">
<h3 class="flow-title">사용자 입력 수신</h3>
<p class="flow-desc">웹/모바일 채팅 인터페이스를 통한 실시간 메시지 수신</p>
</div>
</div>
<div class="flow-arrow"><i class="fas fa-arrow-down"></i></div>

<!-- Step 2 -->
<div class="flow-item">
<div class="flow-number">2</div>
<div class="flow-content">
<h3 class="flow-title">NLU 엔진 분석</h3>
<p class="flow-desc">자연어 이해 모델로 의도(Intent) 및 개체(Entity) 추출</p>
</div>
</div>
<div class="flow-arrow"><i class="fas fa-arrow-down"></i></div>

<!-- Step 3 -->
<div class="flow-item">
<div class="flow-number">3</div>
<div class="flow-content">
<h3 class="flow-title">컨텍스트 처리</h3>
<p class="flow-desc">대화 문맥 유지 및 세션 관리를 통한 정확한 이해</p>
</div>
</div>
<div class="flow-arrow"><i class="fas fa-arrow-down"></i></div>

<!-- Step 4 -->
<div class="flow-item">
<div class="flow-number">4</div>
<div class="flow-content">
<h3 class="flow-title">응답 생성</h3>
<p class="flow-desc">AI 모델 기반 최적화된 답변 생성 및 포맷팅</p>
</div>
</div>
<div class="flow-arrow"><i class="fas fa-arrow-down"></i></div>

<!-- Step 5 -->
<div class="flow-item">
<div class="flow-number">5</div>
<div class="flow-content">
<h3 class="flow-title">응답 전송</h3>
<p class="flow-desc">WebSocket/API를 통한 실시간 응답 전달 및 로깅</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
