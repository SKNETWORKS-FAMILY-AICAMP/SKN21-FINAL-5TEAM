<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>예산 및 리소스</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 35%;
    height: 100%;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 65%;
    height: 100%;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.heading-medium {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #999;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 3px
    }
.heading-large {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 56px;
    line-height: 1.1;
    color: #000;
    margin-bottom: 30px
    }
.accent-bar {
    width: 80px;
    height: 6px;
    background-color: #000;
    margin-bottom: 30px
    }
.body-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #666;
    line-height: 1.8
    }
.budget-section {
    margin-bottom: 35px
    }
.section-title {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #000;
    margin-bottom: 15px
    }
.budget-table {
    width: 100%;
    border-collapse: collapse
    }
.budget-table th {
    background-color: #000;
    color: #fff;
    padding: 12px 15px;
    text-align: left;
    font-size: 14px;
    font-weight: 600
    }
.budget-table td {
    padding: 12px 15px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
    color: #333
    }
.budget-table tr:hover td {
    background-color: #f8f8f8
    }
.budget-amount {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    color: #000
    }
.chart-container {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-top: 25px
    }
.pie-chart {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: conic-gradient(#000 0% 35%, #333 35% 60%, #666 60% 85%, #999 85% 100%);
    position: relative
    }
.pie-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100px;
    height: 100px;
    background-color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Montserrat", sans-serif;
    font-weight: 900;
    font-size: 24px;
    color: #000
    }
.chart-legend {
    display: flex;
    flex-direction: column;
    gap: 12px
    }
.legend-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px
    }
.legend-color {
    width: 20px;
    height: 20px;
    border-radius: 3px
    }
.legend-text {
    font-family: "Noto Sans KR", sans-serif;
    color: #333
    }
.legend-value {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    color: #000;
    margin-left: auto
    }
.circle-decoration {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 200px;
    height: 200px;
    border: 20px solid #f5f5f5;
    bottom: -80px;
    left: -80px;
    opacity: 0.5
    }
.circle-2 {
    width: 150px;
    height: 150px;
    border: 15px solid #f5f5f5;
    top: 60px;
    right: -60px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 25px 25px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-decoration circle-1"></div>
<div class="circle-decoration circle-2"></div>

<!-- Left Content -->
<div class="left-content">
<div style="position: relative;
z-index: 2">
<p class="heading-medium">BUDGET & RESOURCES</p>
<h1 class="heading-large">예산 및<br/>리소스</h1>
<div class="accent-bar"></div>
<p class="body-text">
프로젝트 예산과 인력 리소스 배분을 체계적으로 관리합니다.
</p>
</div>
</div>

<!-- Right Content -->
<div class="right-content">
<div style="position: relative;
z-index: 2">
<!-- Budget Table -->
<div class="budget-section">
<h3 class="section-title">예산 배분</h3>
<table class="budget-table">
<thead>
<tr>
<th>항목</th>
<th>금액 (만원)</th>
<th>비율</th>
</tr>
</thead>
<tbody>
<tr>
<td>인건비</td>
<td class="budget-amount">₩15,000</td>
<td>50%</td>
</tr>
<tr>
<td>개발 도구 및 라이선스</td>
<td class="budget-amount">₩6,000</td>
<td>20%</td>
</tr>
<tr>
<td>서버 및 인프라</td>
<td class="budget-amount">₩4,500</td>
<td>15%</td>
</tr>
<tr>
<td>교육 및 테스트</td>
<td class="budget-amount">₩3,000</td>
<td>10%</td>
</tr>
<tr>
<td>예비비</td>
<td class="budget-amount">₩1,500</td>
<td>5%</td>
</tr>
<tr style="background-color: #000">
<td style="color: #fff;
font-weight: 700">총 예산</td>
<td class="budget-amount" style="color: #fff">₩30,000</td>
<td style="color: #fff">100%</td>
</tr>
</tbody>
</table>
</div>

<!-- Resource Chart -->
<div class="chart-container">
<div class="pie-chart">
<div class="pie-center">6명</div>
</div>
<div class="chart-legend">
<div class="legend-item">
<div class="legend-color" style="background-color: #000"></div>
<span class="legend-text">프론트엔드</span>
<span class="legend-value">2명</span>
</div>
<div class="legend-item">
<div class="legend-color" style="background-color: #333"></div>
<span class="legend-text">백엔드</span>
<span class="legend-value">2명</span>
</div>
<div class="legend-item">
<div class="legend-color" style="background-color: #666"></div>
<span class="legend-text">AI 엔지니어</span>
<span class="legend-value">1명</span>
</div>
<div class="legend-item">
<div class="legend-color" style="background-color: #999"></div>
<span class="legend-text">PM</span>
<span class="legend-value">1명</span>
</div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
