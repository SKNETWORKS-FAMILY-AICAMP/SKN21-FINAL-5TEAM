<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>예산 및 리소스</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="theme.css" rel="stylesheet"/>
<style>
.slide-inner {
    display: flex;
    gap: 36px;
    height: calc(100% - 80px);
    align-items: flex-start;
    margin-top: 4px;
}
.left-col {
    width: 220px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
}
.right-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-top: 4px;
}
.section-heading {
    font-family: "Montserrat", sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--coral);
    margin: 0 0 10px;
}
.budget-table-custom {
    width: 100%;
    border-collapse: collapse;
}
.budget-table-custom th {
    background: var(--accent);
    color: #FAF7F0;
    padding: 9px 12px;
    text-align: left;
    font-family: "Montserrat", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
}
.budget-table-custom th:first-child { border-radius: 8px 0 0 0; }
.budget-table-custom th:last-child  { border-radius: 0 8px 0 0; }
.budget-table-custom td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
}
.budget-table-custom tr:hover td {
    background: var(--surface-alt);
}
.budget-table-custom .total td {
    background: var(--accent-soft);
    font-weight: 700;
    color: var(--accent-strong);
    border-bottom: none;
}
.budget-amount {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    color: var(--accent-strong);
}
/* 도넛 차트 */
.chart-wrap {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 16px 18px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--line);
}
.donut {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: conic-gradient(
        var(--accent)       0%   35%,
        var(--accent-light) 35%  55%,
        var(--coral)        55%  70%,
        #D4A853             70%  85%,
        var(--surface-alt)  85%  100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
}
.donut-inner {
    width: 74px;
    height: 74px;
    background: var(--surface);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Montserrat", sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--text);
    position: absolute;
}
.legend {
    display: flex;
    flex-direction: column;
    gap: 9px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text);
}
.legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
}
.legend-label { flex: 1; }
.legend-val {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    color: var(--accent-strong);
    font-size: 13px;
}
</style>
</head>
<body>
<main class="slide">
  <div class="topbar">
    <p class="eyebrow">Budget &amp; Resources</p>
    <span class="page-number">17</span>
  </div>
  <div class="slide-inner">
    <div class="left-col hero">
      <h1 style="font-size:34px; line-height:1.1;">예산 및<br/>리소스</h1>
      <div class="accent-bar"></div>
      <p class="lead">프로젝트 예산과<br/>인력 리소스 배분</p>
    </div>
    <div class="right-col">
      <!-- Budget Table -->
      <div>
        <p class="section-heading">예산 배분</p>
        <table class="budget-table-custom">
          <thead>
            <tr>
              <th>항목</th>
              <th>금액 (만원)</th>
              <th>비율</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>인건비</td><td class="budget-amount">₩15,000</td><td>50%</td></tr>
            <tr><td>개발 도구 및 라이선스</td><td class="budget-amount">₩6,000</td><td>20%</td></tr>
            <tr><td>서버 및 인프라</td><td class="budget-amount">₩4,500</td><td>15%</td></tr>
            <tr><td>교육 및 테스트</td><td class="budget-amount">₩3,000</td><td>10%</td></tr>
            <tr><td>예비비</td><td class="budget-amount">₩1,500</td><td>5%</td></tr>
            <tr class="total">
              <td>총 예산</td>
              <td class="budget-amount">₩30,000</td>
              <td>100%</td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- Resource Chart -->
      <div>
        <p class="section-heading">인력 배분</p>
        <div class="chart-wrap">
          <div class="donut">
            <div class="donut-inner">6명</div>
          </div>
          <div class="legend">
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--accent)"></div>
              <span class="legend-label">프론트엔드</span>
              <span class="legend-val">2명</span>
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--accent-light)"></div>
              <span class="legend-label">백엔드</span>
              <span class="legend-val">2명</span>
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--coral)"></div>
              <span class="legend-label">AI 엔지니어</span>
              <span class="legend-val">1명</span>
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#D4A853"></div>
              <span class="legend-label">PM</span>
              <span class="legend-val">1명</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <p class="footnote">SKN21 FINAL 5TEAM · 2026 Project Presentation</p>
</main>
</body>
</html>
