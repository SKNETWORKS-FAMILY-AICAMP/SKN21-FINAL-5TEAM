<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Q&A</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 60px;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 60px;
    position: relative;
    z-index: 10;
    background-color: #000
    }
.main-title {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 160px;
    line-height: 1;
    color: #000;
    letter-spacing: -5px;
    margin-bottom: 30px
    }
.subtitle {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 600;
    font-size: 24px;
    color: #666;
    text-align: center;
    line-height: 1.6
    }
.icon-container {
    width: 180px;
    height: 180px;
    background-color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px
    }
.main-icon {
    font-size: 100px;
    color: #000
    }
.question-prompt {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: #fff;
    text-align: center;
    margin-bottom: 30px;
    line-height: 1.4
    }
.contact-info {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #999;
    text-align: center;
    line-height: 1.8
    }
.circle-accent {
    position: absolute;
    border-radius: 50%;
    z-index: 1
    }
.circle-1 {
    width: 300px;
    height: 300px;
    border: 40px solid #f5f5f5;
    top: -150px;
    left: -150px
    }
.circle-2 {
    width: 200px;
    height: 200px;
    border: 30px solid rgba(255, 255, 255, 0.1);
    bottom: -100px;
    right: -100px
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="circle-accent circle-1"></div>
<div class="circle-accent circle-2"></div>
<div class="pattern-dots"></div>

<!-- Left Content -->
<div class="left-content">
<h1 class="main-title">Q&A</h1>
<p class="subtitle">질문과 답변 시간<br/>자유롭게 질문해 주세요</p>
</div>

<!-- Right Content -->
<div class="right-content">
<div class="icon-container">
<i class="fas fa-comments main-icon"></i>
</div>
<p class="question-prompt">프로젝트에 대해<br/>궁금한 점이 있으신가요?</p>
<div class="contact-info">
<p style="margin-bottom: 15px"><i class="fas fa-envelope" style="margin-right: 10px"></i> project@company.com</p>
<p style="margin-bottom: 15px"><i class="fas fa-phone" style="margin-right: 10px"></i> 02-1234-5678</p>
<p><i class="fas fa-globe" style="margin-right: 10px"></i> www.chatbot-project.com</p>
</div>
</div>
</div>
</body>
</html>
