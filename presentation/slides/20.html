<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>감사합니다</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 50%;
    height: 100%;
    padding: 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 50%;
    height: 100%;
    position: relative;
    background: linear-gradient(135deg, #000 0%, #333 100%);
    z-index: 10
    }
.heading-thank {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 100px;
    line-height: 1;
    color: #000;
    margin-bottom: 20px;
    letter-spacing: -3px
    }
.heading-you {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 100px;
    line-height: 1;
    color: #f5f5f5;
    -webkit-text-stroke: 2px #000;
    margin-bottom: 40px;
    letter-spacing: -3px
    }
.accent-bar {
    width: 100px;
    height: 8px;
    background-color: #000;
    margin-bottom: 40px
    }
.contact-item {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    font-size: 18px;
    color: #333
    }
.contact-icon {
    width: 40px;
    height: 40px;
    background-color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    margin-right: 20px;
    font-size: 16px
    }
.right-icon-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background-color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(255, 255, 255, 0.3)
    }
.right-icon {
    font-size: 120px;
    color: #000
    }
.circle-accent {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 300px;
    height: 300px;
    border: 50px solid #f5f5f5;
    top: -150px;
    left: -150px;
    opacity: 0.5
    }
.circle-2 {
    width: 200px;
    height: 200px;
    border: 30px solid #f0f0f0;
    bottom: -100px;
    left: 100px;
    opacity: 0.3
    }
.circle-3 {
    width: 150px;
    height: 150px;
    background-color: #f5f5f5;
    bottom: 80px;
    right: -75px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 25px 25px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-accent circle-1"></div>
<div class="circle-accent circle-2"></div>
<div class="circle-accent circle-3"></div>

<!-- Left Content -->
<div class="left-content">
<h1 class="heading-thank">감사합니다</h1>
<h1 class="heading-you">THANK YOU</h1>
<div class="accent-bar"></div>
<div class="contact-item">
<div class="contact-icon">
<i class="fas fa-envelope"></i>
</div>
<span>contact@company.com</span>
</div>
<div class="contact-item">
<div class="contact-icon">
<i class="fas fa-phone"></i>
</div>
<span>02-1234-5678</span>
</div>
<div class="contact-item">
<div class="contact-icon">
<i class="fas fa-globe"></i>
</div>
<span>www.company.com</span>
</div>
<div class="contact-item">
<div class="contact-icon">
<i class="fas fa-map-marker-alt"></i>
</div>
<span>서울시 강남구 테헤란로 123</span>
</div>
</div>

<!-- Right Content -->
<div class="right-content">
<div class="right-icon-container">
<i class="fas fa-check right-icon"></i>
</div>
</div>
</div>
</body>
</html>
