<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>챗봇 필요성</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 40%;
    height: 100%;
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 60%;
    height: 100%;
    padding: 80px 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.heading-medium {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #999;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 3px
    }
.heading-large {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.1;
    color: #000;
    margin-bottom: 30px
    }
.accent-bar {
    width: 80px;
    height: 6px;
    background-color: #000;
    margin-bottom: 40px
    }
.body-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #666;
    line-height: 1.8
    }
.need-item {
    display: flex;
    align-items: center;
    margin-bottom: 35px;
    position: relative
    }
.need-number {
    font-family: "Montserrat", sans-serif;
    font-weight: 900;
    font-size: 72px;
    color: #f0f0f0;
    line-height: 1;
    margin-right: 30px;
    min-width: 100px
    }
.need-content {
    flex: 1
    }
.need-icon {
    width: 50px;
    height: 50px;
    background-color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
    margin-bottom: 12px
    }
.need-title {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #000;
    margin-bottom: 8px
    }
.need-desc {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 15px;
    color: #999;
    line-height: 1.5
    }
.circle-decoration {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 250px;
    height: 250px;
    border: 25px solid #f5f5f5;
    top: -80px;
    right: -80px;
    opacity: 0.5
    }
.circle-2 {
    width: 150px;
    height: 150px;
    border: 20px solid #f5f5f5;
    bottom: 60px;
    left: -50px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-decoration circle-1"></div>
<div class="circle-decoration circle-2"></div>
<!-- Left Content -->
<div class="left-content">
<div style="position: relative;
z-index: 2">
<p class="heading-medium">WHY CHATBOT?</p>
<h1 class="heading-large">챗봇<br/>필요성</h1>
<div class="accent-bar"></div>
<p class="body-text">
AI 챗봇 시스템을 도입해야 하는 핵심 이유와 기대 효과를 정리했습니다.
</p>
</div>
</div>
<!-- Right Content -->
<div class="right-content">
<div style="width: 100%;
position: relative;
z-index: 2">
<div class="need-item">
<div class="need-number">01</div>
<div class="need-content">
<div class="need-icon">
<i class="fas fa-clock"></i>
</div>
<h3 class="need-title">24시간 실시간 대응</h3>
<p class="need-desc">고객 문의에 즉각 응답하여 만족도 향상</p>
</div>
</div>
<div class="need-item">
<div class="need-number">02</div>
<div class="need-content">
<div class="need-icon">
<i class="fas fa-chart-line"></i>
</div>
<h3 class="need-title">운영 비용 절감</h3>
<p class="need-desc">인건비 감소 및 효율적인 리소스 관리</p>
</div>
</div>
<div class="need-item">
<div class="need-number">03</div>
<div class="need-content">
<div class="need-icon">
<i class="fas fa-database"></i>
</div>
<h3 class="need-title">데이터 기반 서비스 개선</h3>
<p class="need-desc">고객 문의 분석을 통한 맞춤형 서비스 제공</p>
</div>
</div>
<div class="need-item">
<div class="need-number">04</div>
<div class="need-content">
<div class="need-icon">
<i class="fas fa-cogs"></i>
</div>
<h3 class="need-title">일관된 서비스 품질</h3>
<p class="need-desc">표준화된 응대로 균일한 고객 경험 제공</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
