<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI 고객상담 챗봇 웹사이트 제작</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-section {
    width: 50%;
    height: 100%;
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-section {
    width: 50%;
    height: 100%;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1a1a1a 0%, #333 100%)
    }
.main-title {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 1;
    color: #000;
    margin-bottom: 30px;
    letter-spacing: -2px
    }
.subtitle {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #666;
    margin-bottom: 40px;
    letter-spacing: 1px
    }
.accent-bar {
    width: 100px;
    height: 8px;
    background-color: #000;
    margin-bottom: 50px
    }
.details-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 16px;
    color: #666;
    line-height: 1.8
    }
.circle-accent {
    position: absolute;
    border-radius: 50%;
    z-index: 1
    }
.circle-1 {
    width: 400px;
    height: 400px;
    border: 40px solid #f5f5f5;
    top: -150px;
    left: -150px
    }
.circle-2 {
    width: 200px;
    height: 200px;
    border: 20px solid #000;
    bottom: 60px;
    right: 40px;
    opacity: 0.1
    }
.circle-3 {
    width: 100px;
    height: 100px;
    background-color: #000;
    bottom: 120px;
    left: -50px;
    opacity: 0.05
    }
.hero-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.15;
    mix-blend-mode: overlay
    }
.logo-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    background-color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    z-index: 20
    }
.logo-icon {
    font-size: 80px;
    color: #fff
    }
.pizza-pattern {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.03;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<!-- Background Pattern -->
<div class="pizza-pattern"></div>
<!-- Left Section -->
<div class="left-section">
<!-- Decorative Circles -->
<div class="circle-accent circle-1"></div>
<div class="circle-accent circle-2"></div>
<div class="circle-accent circle-3"></div>
<div style="position: relative;
z-index: 2">
<h1 class="main-title">AI 고객상담<br/>챗봇 웹사이트<br/>제작</h1>
<p class="subtitle">AI CHATBOT WEBSITE DEVELOPMENT</p>
<div class="accent-bar"></div>
<div class="details-text">
<p style="margin-bottom: 10px;
font-weight: 600"><i class="fas fa-calendar-alt" style="color: #000;
margin-right: 10px"></i> 2026년 프로젝트</p>
<p style="font-weight: 600"><i class="fas fa-robot" style="color: #000;
margin-right: 10px"></i> 인공지능 기반 고객 서비스 솔루션</p>
</div>
</div>
</div>
<!-- Right Section -->
<div class="right-section">
<img alt="AI Chatbot Technology" class="hero-image" src="https://page.gensparksite.com/slides_images/ai-chatbot-concept.jpg"/>
<!-- Logo Badge -->
<div class="logo-circle">
<i class="fas fa-robot logo-icon"></i>
</div>
</div>
</div>
</body>
</html>
