<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>기술 스택 요약</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans KR", sans-serif;
    background-color: #fff
    }
.slide-container {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    background-color: #fff;
    overflow: hidden
    }
.left-content {
    width: 35%;
    height: 100%;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.right-content {
    width: 65%;
    height: 100%;
    padding: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 10
    }
.heading-medium {
    font-family: "Montserrat", sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #999;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 3px
    }
.heading-large {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: 56px;
    line-height: 1.1;
    color: #000;
    margin-bottom: 30px
    }
.accent-bar {
    width: 80px;
    height: 6px;
    background-color: #000;
    margin-bottom: 30px
    }
.body-text {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 18px;
    color: #666;
    line-height: 1.8
    }
.stack-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 750px
    }
.stack-item {
    background-color: #f8f8f8;
    padding: 25px 20px;
    border-radius: 8px;
    text-align: center;
    transition: all 0.3s ease
    }
.stack-item:hover {
    background-color: #000
    }
.stack-item:hover .stack-icon,
.stack-item:hover .stack-name {
    color: #fff
    }
.stack-icon {
    font-size: 40px;
    color: #000;
    margin-bottom: 12px
    }
.stack-name {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #000;
    margin-bottom: 4px
    }
.stack-category {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 12px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px
    }
.circle-decoration {
    position: absolute;
    border-radius: 50%;
    z-index: 0
    }
.circle-1 {
    width: 200px;
    height: 200px;
    border: 20px solid #f5f5f5;
    bottom: -80px;
    left: -80px;
    opacity: 0.5
    }
.circle-2 {
    width: 150px;
    height: 150px;
    border: 15px solid #f5f5f5;
    top: 60px;
    right: -60px;
    opacity: 0.3
    }
.pattern-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#000 1px, transparent 1px);
    background-size: 25px 25px;
    opacity: 0.02;
    z-index: 0
    }</style>
</head>
<body>
<div class="slide-container">
<div class="pattern-dots"></div>
<div class="circle-decoration circle-1"></div>
<div class="circle-decoration circle-2"></div>

<!-- Left Content -->
<div class="left-content">
<div style="position: relative;
z-index: 2">
<p class="heading-medium">TECH STACK</p>
<h1 class="heading-large">기술 스택<br/>요약</h1>
<div class="accent-bar"></div>
<p class="body-text">
프로젝트에 사용되는 전체 기술 스택을 한눈에 확인할 수 있습니다.
</p>
</div>
</div>

<!-- Right Content -->
<div class="right-content">
<div class="stack-grid">
<!-- Frontend -->
<div class="stack-item">
<i class="fab fa-react stack-icon"></i>
<h3 class="stack-name">React</h3>
<p class="stack-category">Frontend</p>
</div>

<div class="stack-item">
<i class="fas fa-code stack-icon"></i>
<h3 class="stack-name">TypeScript</h3>
<p class="stack-category">Language</p>
</div>

<div class="stack-item">
<i class="fas fa-paint-brush stack-icon"></i>
<h3 class="stack-name">Tailwind CSS</h3>
<p class="stack-category">Styling</p>
</div>

<!-- Backend -->
<div class="stack-item">
<i class="fab fa-node-js stack-icon"></i>
<h3 class="stack-name">Node.js</h3>
<p class="stack-category">Backend</p>
</div>

<div class="stack-item">
<i class="fas fa-server stack-icon"></i>
<h3 class="stack-name">Express</h3>
<p class="stack-category">Framework</p>
</div>

<div class="stack-item">
<i class="fas fa-database stack-icon"></i>
<h3 class="stack-name">PostgreSQL</h3>
<p class="stack-category">Database</p>
</div>

<!-- AI & Tools -->
<div class="stack-item">
<i class="fas fa-brain stack-icon"></i>
<h3 class="stack-name">Dialogflow</h3>
<p class="stack-category">AI Engine</p>
</div>

<div class="stack-item">
<i class="fas fa-robot stack-icon"></i>
<h3 class="stack-name">GPT-4</h3>
<p class="stack-category">LLM Model</p>
</div>

<div class="stack-item">
<i class="fab fa-docker stack-icon"></i>
<h3 class="stack-name">Docker</h3>
<p class="stack-category">Container</p>
</div>
</div>
</div>
</div>
</body>
</html>
