server {
    listen 80;
    server_name moyeo.kro.kr 3.35.151.92;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 프론트엔드
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 백엔드 API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 스트리밍 (챗봇용)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # products 관련 API만 백엔드로 전달 (페이지 라우트 /products, 이미지 /products/*.jpg 는 프론트 처리)
    location ~ ^/products/(new|used|categories|images)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /shipping 은 페이지 라우트와 API가 같은 경로를 사용하므로 query(user_id) 기준 분기
    location = /shipping {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        if ($arg_user_id != "") {
            proxy_pass http://host.docker.internal:8000;
        }

        if ($arg_user_id = "") {
            proxy_pass http://frontend:3000;
        }
    }

    # 백엔드 직접 라우트 (users, carts 등)
    location ~ ^/(users|carts|orders|payments|shipping/|inventories|points|reviews|user-history) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 챗봇 업로드 이미지 정적 파일
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
