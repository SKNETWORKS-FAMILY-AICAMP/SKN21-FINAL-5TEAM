server {
    listen 80;
    server_name moyeo.kro.kr;

    # 프론트엔드
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 백엔드 API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE 스트리밍 (챗봇용)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # 백엔드 직접 라우트 (users, products, carts 등)
    location ~ ^/(users|products|carts|orders|payments|shipping|inventories|points|reviews|user-history) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
